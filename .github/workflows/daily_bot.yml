name: Daily Study Bot

on:
  schedule:
    - cron: '0 4 * * *'   # 9:30 AM IST  (4:00 AM UTC)
    - cron: '0 16 * * *'  # 9:30 PM IST  (4:00 PM UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: 'morning or evening'
        required: false
        default: 'morning'

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-telegram-bot

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge "12" ]; then
              echo "mode=evening" >> $GITHUB_OUTPUT
            else
              echo "mode=morning" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py ${{ steps.mode.outputs.mode }}
